name: Production Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Lint
      run: npm run lint --workspace=apps/web

    - name: Type Check (Web)
      run: npx tsc --noEmit --project apps/web/tsconfig.json

    - name: Build Web
      run: npm run build --workspace=apps/web
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8000

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r apps/engine/requirements.txt

    # Verify Engine runs (simple import check or unit test)
    - name: Test Engine Import
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        python -c "from apps.engine.main import app; print('Engine loaded successfully')"
