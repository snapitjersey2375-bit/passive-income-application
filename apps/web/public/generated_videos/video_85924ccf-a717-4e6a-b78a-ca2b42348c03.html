
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deary, have you seen this? The Future of AI Automation</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        .container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        
        /* Background Image with Ken Burns Effect */
        .bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://source.unsplash.com/featured/800x600?AI%20Automation&sig=932');
            background-size: cover;
            background-position: center;
            opacity: 0.6;
            animation: kenburns 15s infinite alternate;
        }
        
        @keyframes kenburns {
            0% { transform: scale(1); }
            100% { transform: scale(1.2) translate(2%, 2%); }
        }
        
        /* Overlay Text */
        .content {
            position: relative;
            z-index: 10;
            color: white;
            text-align: center;
            max-width: 80%;
            text-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeup 1s forwards 0.5s;
        }
        
        p {
            font-size: 1.5rem;
            opacity: 0;
            animation: fadeup 1s forwards 1.2s;
        }
        
        @keyframes fadeup {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Progress Bar to simulate video playback */
        .progress {
            position: absolute;
            bottom: 0; left: 0; height: 5px; background: red;
            width: 0%;
            animation: play 10s linear forwards;
        }
        @keyframes play { to { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="bg-image"></div>
        <div class="content">
            <h1>Deary, have you seen this? The Future of AI Automation</h1>
            <p>Predictions for AI Automation in 2026 based on new data.</p>
        </div>
        <div class="progress"></div>
    </div>
</body>
</html>
